name: Deploy to cPanel (registration.solidrow.lk)

# Runs on every push to main. Builds the React SPA, installs PHP deps,
# then FTP-syncs the app to the server. Only changed files are uploaded.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger a deploy by hand from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2 # lets us diff HEAD~1 to detect composer.lock changes

      # ---------- Build the React front-end ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build front-end
        run: |
          npm install --prefix frontend
          npm run build --prefix frontend
          # Drop the fresh build into Laravel's public folder
          rm -rf backend/public/assets
          cp -r frontend/dist/* backend/public/

      # ---------- Install PHP / Composer deps ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, pdo, tokenizer, xml, curl, gd, pdo_mysql

      - name: Install Composer deps
        run: |
          cp backend/.env.example backend/.env || true
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --working-dir=backend

      # ---------- Deploy via lftp (explicit FTPS, robust for large files) ----------
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy over FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -e

          # Only re-sync the huge vendor/ tree when composer deps actually change.
          # (Listing vendor/ over FTPS is what makes a deploy slow.)
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo ALL)
          SYNC_VENDOR=0
          if [ "$CHANGED" = ALL ] || [ "${{ github.event_name }}" = workflow_dispatch ] \
             || echo "$CHANGED" | grep -qE '^backend/composer\.(json|lock)$'; then
            SYNC_VENDOR=1
          fi
          echo "SYNC_VENDOR=$SYNC_VENDOR"

          LFTP_OPTS="set cmd:fail-exit true; set ftp:ssl-force true; set ftp:ssl-protect-data true; set ssl:verify-certificate no; set ftp:passive-mode true; set net:max-retries 3; set net:timeout 30;"
          run_lftp() { printf '%s\n%s\nbye\n' "$LFTP_OPTS" "$1" | lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER"; }

          # 1) Laravel app (WITHOUT vendor) -> registration_app/
          # NOTE: no --ignore-time here. A fresh CI checkout gives new mtimes, so
          # mirror re-uploads every changed file. (--ignore-time compares size only,
          # which silently skips same-size edits like index.html's hashed asset refs.)
          run_lftp "mirror -R --parallel=3 --exclude '\.git' --exclude 'node_modules/' --exclude '^vendor/' --exclude '^\.env' --exclude '^public/' --exclude '^storage' --exclude '^tests/' ./backend/ registration_app/"

          # 2) Built public assets -> doc root (skip custom index.php + storage symlink)
          run_lftp "mirror -R --parallel=3 --exclude '\.git' --exclude '^index\.php\$' --exclude '^storage' ./backend/public/ sites/registration.solidrow.lk/"

          # 2b) Force-overwrite index.html unconditionally. It keeps the SAME name and
          # byte-size across builds (only the hashed asset ref changes), and the server
          # clock runs ahead of the runner, so mirror's size/time check skips it. put
          # always overwrites, guaranteeing the browser loads the freshly built bundle.
          run_lftp "put -O sites/registration.solidrow.lk/ ./backend/public/index.html"

          # 3) vendor/ only when composer deps changed
          if [ "$SYNC_VENDOR" = 1 ]; then
            echo "Syncing vendor/ ..."
            run_lftp "mirror -R --ignore-time --parallel=4 ./backend/vendor/ registration_app/vendor/"
          else
            echo "Skipping vendor/ (composer deps unchanged)"
          fi
