name: Deploy to cPanel (registration.solidrow.lk)

# Runs on every push to main. Builds the React SPA, installs PHP deps,
# then FTP-syncs the app to the server. Only changed files are uploaded.
on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger a deploy by hand from the Actions tab

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Build the React front-end ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build front-end
        run: |
          npm install --prefix frontend
          npm run build --prefix frontend
          # Drop the fresh build into Laravel's public folder
          rm -rf backend/public/assets
          cp -r frontend/dist/* backend/public/

      # ---------- Install PHP / Composer deps ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, bcmath, ctype, fileinfo, openssl, pdo, tokenizer, xml, curl, gd, pdo_mysql

      - name: Install Composer deps
        run: |
          cp backend/.env.example backend/.env || true
          composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --working-dir=backend

      # ---------- Deploy via lftp (explicit FTPS, robust for large files) ----------
      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy over FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<'LFTP'
          set cmd:fail-exit true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:max-retries 3
          set net:timeout 30

          # 1) Laravel app -> registration_app/ (above web root)
          mirror -R --ignore-time --parallel=1 \
            --exclude '\.git' \
            --exclude 'node_modules/' \
            --exclude '^\.env' \
            --exclude '^public/' \
            --exclude '^storage' \
            --exclude '^tests/' \
            ./backend/ registration_app/

          # 2) Built public assets -> doc root (skip custom index.php + storage symlink)
          mirror -R --ignore-time --parallel=1 \
            --exclude '\.git' \
            --exclude '^index\.php$' \
            --exclude '^storage' \
            ./backend/public/ sites/registration.solidrow.lk/

          bye
          LFTP
