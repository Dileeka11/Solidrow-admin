name: solidrow_staff_app
description: "Solidrow Staff Attendance Scanner App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  dio: ^5.7.0

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # QR scanner (camera)
  mobile_scanner: ^7.0.0

  # Navigation
  go_router: ^14.6.2

  # State management
  flutter_riverpod: ^2.6.1

  # Google Fonts
  google_fonts: ^6.2.1

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# App launcher icon — generated from the Solidrow logo.
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/solidrow-foreign-employment.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/solidrow-foreign-employment.png"
  web:
    generate: true
    background_color: "#FFFFFF"
    theme_color: "#00D4FF"
